name: Bootstrap GHCR

on:
  workflow_dispatch:

concurrency:
  group: bootstrap-ghcr
  cancel-in-progress: false

permissions: {}

jobs:
  image:
    if: github.repository == 'klimPaskov/hoi4-agent-tools'
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Require the canonical public main branch
        shell: bash
        env:
          REPOSITORY_VISIBILITY: ${{ github.event.repository.visibility }}
        run: |
          test "$GITHUB_REPOSITORY" = 'klimPaskov/hoi4-agent-tools'
          test "$GITHUB_REF" = 'refs/heads/main'
          test "$REPOSITORY_VISIBILITY" = 'public'
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          tags: ghcr.io/klimpaskov/hoi4-agent-tools:bootstrap
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
      - name: Verify the published bootstrap tag and exact runtime platforms
        shell: bash
        run: |
          IMAGE='ghcr.io/klimpaskov/hoi4-agent-tools:bootstrap'
          MANIFEST="$(docker buildx imagetools inspect --raw "$IMAGE")"
          RUNTIME_PLATFORMS="$(jq --raw-output \
            '[.manifests[] | select(.platform.os == "linux") | "\(.platform.os)/\(.platform.architecture)"] | unique | sort | join(",")' \
            <<<"$MANIFEST")"
          test "$RUNTIME_PLATFORMS" = 'linux/amd64,linux/arm64'
